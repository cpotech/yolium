<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#000810"/>
    </linearGradient>

    <!-- Hexagon chrome gradient -->
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#60a0d0"/>
      <stop offset="50%" stop-color="#0088cc"/>
      <stop offset="70%" stop-color="#004466"/>
      <stop offset="100%" stop-color="#001830"/>
    </linearGradient>

    <!-- Inner glow -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00aaff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00aaff" stop-opacity="0"/>
    </radialGradient>

    <!-- Red eye gradient -->
    <radialGradient id="eyeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2200"/>
      <stop offset="50%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#660000"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Outer glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glowGrad)"/>

  <!-- Hexagon frame -->
  <polygon
    points="256,56 426,130 426,382 256,456 86,382 86,130"
    fill="none"
    stroke="url(#hexGrad)"
    stroke-width="8"
  />

  <!-- Inner hexagon -->
  <polygon
    points="256,96 386,155 386,357 256,416 126,357 126,155"
    fill="none"
    stroke="#0088cc"
    stroke-width="2"
    opacity="0.5"
  />

  <!-- Center Y letter - chrome style -->
  <text
    x="256"
    y="320"
    text-anchor="middle"
    font-family="Impact, Arial Black, sans-serif"
    font-size="220"
    font-weight="bold"
    fill="url(#hexGrad)"
  >Y</text>

  <!-- Red eye/core at top -->
  <circle cx="256" cy="120" r="20" fill="url(#eyeGrad)"/>
  <circle cx="256" cy="120" r="8" fill="#ffffff" opacity="0.9"/>

  <!-- Scan lines overlay -->
  <g opacity="0.1">
    <line x1="86" y1="180" x2="426" y2="180" stroke="#00aaff" stroke-width="1"/>
    <line x1="86" y1="230" x2="426" y2="230" stroke="#00aaff" stroke-width="1"/>
    <line x1="86" y1="280" x2="426" y2="280" stroke="#00aaff" stroke-width="1"/>
    <line x1="86" y1="330" x2="426" y2="330" stroke="#00aaff" stroke-width="1"/>
  </g>
</svg>
