<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg3)"/>

  <!-- Outer ring of circles -->
  <g fill="none" stroke="#888888" stroke-width="1.5">
    <!-- 12 outer circles -->
    <circle cx="256" cy="76" r="45"/>
    <circle cx="346" cy="106" r="45"/>
    <circle cx="406" cy="166" r="45"/>
    <circle cx="436" cy="256" r="45"/>
    <circle cx="406" cy="346" r="45"/>
    <circle cx="346" cy="406" r="45"/>
    <circle cx="256" cy="436" r="45"/>
    <circle cx="166" cy="406" r="45"/>
    <circle cx="106" cy="346" r="45"/>
    <circle cx="76" cy="256" r="45"/>
    <circle cx="106" cy="166" r="45"/>
    <circle cx="166" cy="106" r="45"/>
  </g>

  <!-- Inner structure circles -->
  <g fill="none" stroke="#aaaaaa" stroke-width="1.5">
    <!-- Seed of Life - center 7 circles -->
    <circle cx="256" cy="256" r="50"/>
    <circle cx="256" cy="206" r="50"/>
    <circle cx="299" cy="231" r="50"/>
    <circle cx="299" cy="281" r="50"/>
    <circle cx="256" cy="306" r="50"/>
    <circle cx="213" cy="281" r="50"/>
    <circle cx="213" cy="231" r="50"/>
  </g>

  <!-- Hexagon frame -->
  <g fill="none" stroke="#666666" stroke-width="1">
    <polygon points="256,136 360,196 360,316 256,376 152,316 152,196"/>
    <!-- Inner cube lines -->
    <line x1="256" y1="136" x2="256" y2="376"/>
    <line x1="152" y1="196" x2="360" y2="316"/>
    <line x1="360" y1="196" x2="152" y2="316"/>
  </g>

  <!-- Blue unicursal hexagram star -->
  <g fill="none" stroke="#2288ff" stroke-width="3">
    <!-- Star points extending beyond the circle -->
    <polygon points="256,56 295,196 436,256 295,316 256,456 217,316 76,256 217,196"/>

    <!-- Inner star connections -->
    <line x1="256" y1="56" x2="295" y2="316"/>
    <line x1="295" y1="316" x2="76" y2="256"/>
    <line x1="76" y1="256" x2="295" y2="196"/>
    <line x1="295" y1="196" x2="256" y2="456"/>
    <line x1="256" y1="456" x2="217" y2="196"/>
    <line x1="217" y1="196" x2="436" y2="256"/>
    <line x1="436" y1="256" x2="217" y2="316"/>
    <line x1="217" y1="316" x2="256" y2="56"/>
  </g>

  <!-- Center point -->
  <circle cx="256" cy="256" r="6" fill="#ffffff"/>
</svg>
