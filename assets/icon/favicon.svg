<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12121e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7cc4fa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Isometric cube faces (3D shading: top brightest, left mid, right darkest) -->
  <g filter="url(#glow)">
    <polygon points="117,176 256,96 395,176 256,256" fill="#3b82f6" fill-opacity="0.15"/>
    <polygon points="117,176 256,256 256,416 117,336" fill="#3b82f6" fill-opacity="0.10"/>
    <polygon points="395,176 395,336 256,416 256,256" fill="#3b82f6" fill-opacity="0.06"/>
  </g>

  <!-- Cube wireframe -->
  <g fill="none" stroke="url(#blue)" stroke-width="2.5" stroke-linejoin="round" filter="url(#glow)">
    <polygon points="256,96 395,176 395,336 256,416 117,336 117,176"/>
    <line x1="256" y1="96" x2="256" y2="416"/>
    <line x1="395" y1="176" x2="117" y2="336"/>
    <line x1="117" y1="176" x2="395" y2="336"/>
  </g>

  <!-- Vertex nodes -->
  <g fill="#60a5fa">
    <circle cx="256" cy="96" r="3"/>
    <circle cx="395" cy="176" r="3"/>
    <circle cx="395" cy="336" r="3"/>
    <circle cx="256" cy="416" r="3"/>
    <circle cx="117" cy="336" r="3"/>
    <circle cx="117" cy="176" r="3"/>
  </g>

  <!-- Center node -->
  <circle cx="256" cy="256" r="5" fill="#ffffff" filter="url(#nodeGlow)"/>
</svg>
