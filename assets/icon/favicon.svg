<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12121e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7cc4fa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Subtle boundary circle -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>

  <!-- Hexagram (two overlapping triangles) -->
  <g filter="url(#glow)">
    <!-- Up triangle -->
    <polygon points="256,106 386,331 126,331"
             fill="#3b82f6" fill-opacity="0.05"
             stroke="url(#blue)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Down triangle -->
    <polygon points="386,181 256,406 126,181"
             fill="#3b82f6" fill-opacity="0.05"
             stroke="url(#blue)" stroke-width="2.5" stroke-linejoin="round"/>
  </g>

  <!-- Vertex nodes -->
  <g fill="#60a5fa">
    <circle cx="256" cy="106" r="2.5"/>
    <circle cx="386" cy="181" r="2.5"/>
    <circle cx="386" cy="331" r="2.5"/>
    <circle cx="256" cy="406" r="2.5"/>
    <circle cx="126" cy="331" r="2.5"/>
    <circle cx="126" cy="181" r="2.5"/>
  </g>

  <!-- Center node -->
  <circle cx="256" cy="256" r="5" fill="#ffffff" filter="url(#nodeGlow)"/>
</svg>
