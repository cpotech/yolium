<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background -->
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#161628"/>
      <stop offset="100%" stop-color="#08080f"/>
    </radialGradient>

    <!-- Tri-color edge gradient: cyan → blue → violet -->
    <linearGradient id="edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="40%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Per-face directional gradients -->
    <linearGradient id="faceTop" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="faceLeft" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="faceRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Neon multi-layer glow -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="wide"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="mid"/>
      <feMerge>
        <feMergeNode in="wide"/>
        <feMergeNode in="mid"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ambient light behind cube -->
    <filter id="ambient" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="28"/>
    </filter>

    <!-- Node glow -->
    <filter id="nodeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Vertex halo -->
    <radialGradient id="halo">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Ambient glow behind cube (hovering effect) -->
  <g filter="url(#ambient)" opacity="0.35">
    <polygon points="256,96 395,176 395,336 256,416 117,336 117,176" fill="#3b82f6"/>
  </g>

  <!-- Constellation dot ring -->
  <g fill="#ffffff">
    <circle cx="256" cy="46" r="1.5" opacity="0.18"/>
    <circle cx="361" cy="74" r="1" opacity="0.10"/>
    <circle cx="438" cy="151" r="1.5" opacity="0.14"/>
    <circle cx="466" cy="256" r="1" opacity="0.10"/>
    <circle cx="438" cy="361" r="1.5" opacity="0.16"/>
    <circle cx="361" cy="438" r="1" opacity="0.08"/>
    <circle cx="256" cy="466" r="1.5" opacity="0.14"/>
    <circle cx="151" cy="438" r="1" opacity="0.10"/>
    <circle cx="74" cy="361" r="1.5" opacity="0.16"/>
    <circle cx="46" cy="256" r="1" opacity="0.10"/>
    <circle cx="74" cy="151" r="1.5" opacity="0.14"/>
    <circle cx="151" cy="74" r="1" opacity="0.08"/>
  </g>

  <!-- Face fills with directional gradients -->
  <polygon points="117,176 256,96 395,176 256,256" fill="url(#faceTop)" opacity="0.14"/>
  <polygon points="117,176 256,256 256,416 117,336" fill="url(#faceLeft)" opacity="0.10"/>
  <polygon points="395,176 395,336 256,416 256,256" fill="url(#faceRight)" opacity="0.07"/>

  <!-- Cube wireframe with neon glow -->
  <g fill="none" stroke="url(#edge)" stroke-width="2" stroke-linejoin="round" filter="url(#neonGlow)">
    <polygon points="256,96 395,176 395,336 256,416 117,336 117,176"/>
    <line x1="256" y1="96" x2="256" y2="416"/>
    <line x1="395" y1="176" x2="117" y2="336"/>
    <line x1="117" y1="176" x2="395" y2="336"/>
  </g>

  <!-- Top face highlight (glass shine) -->
  <line x1="175" y1="148" x2="310" y2="218" stroke="#ffffff" stroke-width="1.5" opacity="0.08" stroke-linecap="round"/>

  <!-- Vertex halos -->
  <g>
    <circle cx="256" cy="96" r="10" fill="url(#halo)"/>
    <circle cx="395" cy="176" r="10" fill="url(#halo)"/>
    <circle cx="395" cy="336" r="10" fill="url(#halo)"/>
    <circle cx="256" cy="416" r="10" fill="url(#halo)"/>
    <circle cx="117" cy="336" r="10" fill="url(#halo)"/>
    <circle cx="117" cy="176" r="10" fill="url(#halo)"/>
  </g>

  <!-- Vertex nodes -->
  <g fill="#60a5fa" filter="url(#nodeGlow)">
    <circle cx="256" cy="96" r="3"/>
    <circle cx="395" cy="176" r="3"/>
    <circle cx="395" cy="336" r="3"/>
    <circle cx="256" cy="416" r="3"/>
    <circle cx="117" cy="336" r="3"/>
    <circle cx="117" cy="176" r="3"/>
  </g>

  <!-- Center node -->
  <circle cx="256" cy="256" r="6" fill="#ffffff" filter="url(#nodeGlow)"/>
</svg>
