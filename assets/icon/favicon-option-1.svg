<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg1)"/>

  <!-- Flower of Life pattern (gray circles) -->
  <g fill="none" stroke="#4a4a4a" stroke-width="1.5" opacity="0.6">
    <!-- Center circle -->
    <circle cx="256" cy="256" r="60"/>
    <!-- 6 surrounding circles -->
    <circle cx="256" cy="196" r="60"/>
    <circle cx="308" cy="226" r="60"/>
    <circle cx="308" cy="286" r="60"/>
    <circle cx="256" cy="316" r="60"/>
    <circle cx="204" cy="286" r="60"/>
    <circle cx="204" cy="226" r="60"/>
    <!-- Outer layer -->
    <circle cx="256" cy="136" r="60"/>
    <circle cx="360" cy="196" r="60"/>
    <circle cx="360" cy="316" r="60"/>
    <circle cx="256" cy="376" r="60"/>
    <circle cx="152" cy="316" r="60"/>
    <circle cx="152" cy="196" r="60"/>
  </g>

  <!-- Outer bright circles with glow -->
  <g fill="none" stroke="#ffffff" stroke-width="2">
    <circle cx="256" cy="96" r="50"/>
    <circle cx="395" cy="176" r="50"/>
    <circle cx="395" cy="336" r="50"/>
    <circle cx="256" cy="416" r="50"/>
    <circle cx="117" cy="336" r="50"/>
    <circle cx="117" cy="176" r="50"/>
  </g>

  <!-- Metatron's Cube lines (cyan) -->
  <g fill="none" stroke="#00e5e5" stroke-width="2">
    <!-- Outer hexagon -->
    <polygon points="256,96 395,176 395,336 256,416 117,336 117,176"/>

    <!-- All connections from center -->
    <line x1="256" y1="256" x2="256" y2="96"/>
    <line x1="256" y1="256" x2="395" y2="176"/>
    <line x1="256" y1="256" x2="395" y2="336"/>
    <line x1="256" y1="256" x2="256" y2="416"/>
    <line x1="256" y1="256" x2="117" y2="336"/>
    <line x1="256" y1="256" x2="117" y2="176"/>

    <!-- Inner hexagon connections -->
    <line x1="256" y1="96" x2="395" y2="336"/>
    <line x1="256" y1="96" x2="117" y2="336"/>
    <line x1="395" y1="176" x2="117" y2="336"/>
    <line x1="395" y1="176" x2="256" y2="416"/>
    <line x1="395" y1="336" x2="117" y2="176"/>
    <line x1="395" y1="336" x2="256" y2="416"/>
    <line x1="117" y1="336" x2="256" y2="416"/>
    <line x1="117" y1="176" x2="256" y2="416"/>
    <line x1="117" y1="176" x2="395" y2="336"/>

    <!-- Cross connections -->
    <line x1="256" y1="96" x2="256" y2="416"/>
    <line x1="117" y1="176" x2="395" y2="336"/>
    <line x1="395" y1="176" x2="117" y2="336"/>

    <!-- Inner star -->
    <polygon points="256,176 326,296 186,296"/>
    <polygon points="256,336 326,216 186,216"/>
  </g>

  <!-- Center circle -->
  <circle cx="256" cy="256" r="8" fill="#00e5e5"/>
</svg>
