<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- Metatron's Cube - minimal white outline -->
  <g fill="none" stroke="#ffffff" stroke-width="2">
    <!-- Outer hexagon -->
    <polygon points="256,96 395,176 395,336 256,416 117,336 117,176"/>

    <!-- Inner hexagon (rotated) -->
    <polygon points="186,136 326,136 395,256 326,376 186,376 117,256"/>

    <!-- Vertex circles -->
    <!-- Top -->
    <circle cx="256" cy="96" r="40"/>
    <!-- Upper right -->
    <circle cx="395" cy="176" r="40"/>
    <!-- Lower right -->
    <circle cx="395" cy="336" r="40"/>
    <!-- Bottom -->
    <circle cx="256" cy="416" r="40"/>
    <!-- Lower left -->
    <circle cx="117" cy="336" r="40"/>
    <!-- Upper left -->
    <circle cx="117" cy="176" r="40"/>

    <!-- Inner vertices -->
    <circle cx="326" cy="176" r="35"/>
    <circle cx="326" cy="336" r="35"/>
    <circle cx="186" cy="336" r="35"/>
    <circle cx="186" cy="176" r="35"/>
    <circle cx="256" cy="176" r="30"/>
    <circle cx="256" cy="336" r="30"/>

    <!-- Center -->
    <circle cx="256" cy="256" r="40"/>

    <!-- Connecting lines -->
    <line x1="256" y1="96" x2="256" y2="416"/>
    <line x1="117" y1="176" x2="395" y2="336"/>
    <line x1="395" y1="176" x2="117" y2="336"/>

    <!-- Diagonal connections -->
    <line x1="256" y1="96" x2="395" y2="336"/>
    <line x1="256" y1="96" x2="117" y2="336"/>
    <line x1="256" y1="416" x2="395" y2="176"/>
    <line x1="256" y1="416" x2="117" y2="176"/>
    <line x1="117" y1="176" x2="395" y2="176"/>
    <line x1="117" y1="336" x2="395" y2="336"/>
  </g>
</svg>
