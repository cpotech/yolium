<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif">
  <defs>
    <!-- Gradients matching Yolium theme -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2744"/>
      <stop offset="100%" style="stop-color:#0a1c30"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#0f2744"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00a8cc"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
    <linearGradient id="dangerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc3545"/>
      <stop offset="100%" style="stop-color:#a71d2a"/>
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#00a8cc"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff6b35"/>
    </marker>

    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="950" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1a3a5c" stroke-width="0.5" opacity="0.3"/>
  </pattern>
  <rect width="1200" height="950" fill="url(#grid)"/>

  <!-- === HEADER WITH YOLIUM LOGO === -->
  <g transform="translate(600, 35)">
    <!-- Robot/arcade icon -->
    <g transform="translate(-30, -20)">
      <rect x="0" y="10" width="60" height="40" rx="6" fill="#0f2744" stroke="#1a3a5c" stroke-width="2"/>
      <rect x="5" y="15" width="50" height="22" rx="3" fill="#0a1628" stroke="#1a3a5c" stroke-width="1"/>
      <!-- Eyes -->
      <rect x="12" y="20" width="10" height="8" rx="2" fill="#00a8cc" opacity="0.8"/>
      <rect x="38" y="20" width="10" height="8" rx="2" fill="#00a8cc" opacity="0.8"/>
      <!-- Red indicator light -->
      <circle cx="30" cy="5" r="4" fill="#dc3545" filter="url(#glow)"/>
      <!-- Antenna -->
      <line x1="30" y1="1" x2="30" y2="-6" stroke="#1a3a5c" stroke-width="2"/>
    </g>
    
    <!-- YOLIUM text -->
    <text x="0" y="50" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="600" letter-spacing="8">YOLIUM</text>
    <text x="0" y="68" text-anchor="middle" fill="#00a8cc" font-size="10" letter-spacing="3">AI AGENTIC SYSTEMS</text>
    <text x="0" y="82" text-anchor="middle" fill="#4a6a8a" font-size="9" letter-spacing="2">CONTAINER ISOLATION ARCHITECTURE</text>
  </g>

  <!-- === MAIN HOST CONTAINER === -->
  <rect x="40" y="120" width="1120" height="790" rx="12" fill="url(#cardGrad)" stroke="#1a3a5c" stroke-width="2" filter="url(#shadow)"/>

  <!-- Host Header -->
  <rect x="40" y="120" width="1120" height="45" rx="12" fill="url(#headerGrad)"/>
  <rect x="40" y="153" width="1120" height="12" fill="url(#headerGrad)"/>
  <text x="600" y="150" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="600" letter-spacing="2">HOST MACHINE</text>

  <!-- Window controls -->
  <circle cx="70" cy="142" r="6" fill="#dc3545"/>
  <circle cx="92" cy="142" r="6" fill="#ffc107"/>
  <circle cx="114" cy="142" r="6" fill="#28a745"/>

  <!-- === BUILD PHASE === -->
  <rect x="80" y="185" width="1040" height="55" rx="8" fill="none" stroke="#1a3a5c" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="100" y="207" fill="#4a6a8a" font-size="10" font-weight="600" letter-spacing="1">BUILD PHASE</text>

  <text x="100" y="228" fill="#8aa8c8" font-size="11">src/docker/Dockerfile</text>
  <path d="M 275 223 L 335 223" stroke="#00a8cc" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <text x="355" y="228" fill="#00a8cc" font-size="11" font-weight="500">docker build</text>
  <path d="M 475 223 L 535 223" stroke="#00a8cc" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- Docker image box -->
  <rect x="555" y="205" width="190" height="36" rx="6" fill="url(#accentGrad)" filter="url(#shadow)"/>
  <text x="650" y="229" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">yolium:latest</text>
  <text x="870" y="228" fill="#6a8aa8" font-size="10">(built once, reused)</text>

  <!-- Arrows from image to containers -->
  <path d="M 650 241 L 650 265 L 220 265 L 220 295" stroke="#00a8cc" stroke-width="2" fill="none" marker-end="url(#arrowCyan)"/>
  <path d="M 650 241 L 650 265 L 600 265 L 600 295" stroke="#00a8cc" stroke-width="2" fill="none" marker-end="url(#arrowCyan)"/>
  <path d="M 650 241 L 650 265 L 980 265 L 980 295" stroke="#00a8cc" stroke-width="2" fill="none" marker-end="url(#arrowCyan)"/>

  <!-- === CONTAINER 1: CLAUDE === -->
  <rect x="80" y="305" width="280" height="125" rx="10" fill="url(#cardGrad)" stroke="#00a8cc" stroke-width="2" filter="url(#shadow)"/>
  <rect x="80" y="305" width="280" height="32" rx="10" fill="#00a8cc" opacity="0.15"/>
  <rect x="80" y="327" width="280" height="10" fill="#00a8cc" opacity="0.15"/>
  <text x="220" y="328" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Container: my-app</text>
  <text x="220" y="358" text-anchor="middle" fill="#6a8aa8" font-size="10">(ephemeral, --rm)</text>
  
  <rect x="100" y="380" width="240" height="35" rx="6" fill="#0a1628" stroke="#00a8cc" stroke-width="1"/>
  <circle cx="120" cy="397" r="4" fill="#28a745"/>
  <text x="220" y="402" text-anchor="middle" fill="#00a8cc" font-size="11" font-weight="500">Agent: Claude Code</text>

  <!-- === CONTAINER 2: OPENCODE === -->
  <rect x="460" y="305" width="280" height="125" rx="10" fill="url(#cardGrad)" stroke="#00a8cc" stroke-width="2" filter="url(#shadow)"/>
  <rect x="460" y="305" width="280" height="32" rx="10" fill="#00a8cc" opacity="0.15"/>
  <rect x="460" y="327" width="280" height="10" fill="#00a8cc" opacity="0.15"/>
  <text x="600" y="328" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Container: api-svc</text>
  <text x="600" y="358" text-anchor="middle" fill="#6a8aa8" font-size="10">(ephemeral, --rm)</text>
  
  <rect x="480" y="380" width="240" height="35" rx="6" fill="#0a1628" stroke="#00a8cc" stroke-width="1"/>
  <circle cx="500" cy="397" r="4" fill="#28a745"/>
  <text x="600" y="402" text-anchor="middle" fill="#00a8cc" font-size="11" font-weight="500">Agent: OpenCode</text>

  <!-- === CONTAINER 3: CODEX === -->
  <rect x="840" y="305" width="280" height="125" rx="10" fill="url(#cardGrad)" stroke="#00a8cc" stroke-width="2" filter="url(#shadow)"/>
  <rect x="840" y="305" width="280" height="32" rx="10" fill="#00a8cc" opacity="0.15"/>
  <rect x="840" y="327" width="280" height="10" fill="#00a8cc" opacity="0.15"/>
  <text x="980" y="328" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Container: cli</text>
  <text x="980" y="358" text-anchor="middle" fill="#6a8aa8" font-size="10">(ephemeral, --rm)</text>

  <rect x="860" y="380" width="240" height="35" rx="6" fill="#0a1628" stroke="#ffc107" stroke-width="1"/>
  <circle cx="880" cy="397" r="4" fill="#28a745"/>
  <text x="980" y="402" text-anchor="middle" fill="#ffc107" font-size="11" font-weight="500">Agent: Codex</text>

  <!-- Converging lines to bind mounts -->
  <path d="M 220 430 L 220 460 L 600 460" stroke="#ff6b35" stroke-width="2" fill="none"/>
  <path d="M 600 430 L 600 460" stroke="#ff6b35" stroke-width="2" fill="none"/>
  <path d="M 980 430 L 980 460 L 600 460" stroke="#ff6b35" stroke-width="2" fill="none"/>
  <path d="M 600 460 L 600 490" stroke="#ff6b35" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>

  <!-- === BIND MOUNTS BANNER === -->
  <rect x="280" y="500" width="640" height="40" rx="8" fill="#ff6b35" filter="url(#shadow)"/>
  <text x="600" y="527" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600" letter-spacing="1">BIND MOUNTS (the ONLY host access)</text>

  <!-- === MOUNT PATHS SECTION === -->
  <rect x="80" y="560" width="1040" height="320" rx="10" fill="url(#cardGrad)" stroke="#1a3a5c" stroke-width="1"/>

  <!-- Divider line -->
  <line x1="580" y1="580" x2="580" y2="860" stroke="#1a3a5c" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- LEFT COLUMN -->

  <!-- Section: Your Project -->
  <g transform="translate(100, 590)">
    <circle cx="0" cy="0" r="4" fill="#ff6b35"/>
    <text x="15" y="5" fill="#ff6b35" font-size="12" font-weight="600">YOUR PROJECT</text>
    <text x="160" y="5" fill="#6a8aa8" font-size="10">(read/write)</text>
  </g>

  <g transform="translate(100, 615)">
    <text y="0" fill="#8aa8c8" font-size="10">~/code/my-app</text>
    <text x="200" y="0" fill="#00a8cc" font-size="12">→</text>
    <text x="220" y="0" fill="#ffffff" font-size="10">/home/agent/code/my-app</text>
  </g>
  <text x="115" y="645" fill="#4a6a8a" font-size="9">(or worktree: /tmp/yolium-worktrees/my-app-abc123)</text>

  <!-- Section: Package Caches -->
  <g transform="translate(100, 675)">
    <circle cx="0" cy="0" r="4" fill="#00a8cc"/>
    <text x="15" y="5" fill="#00a8cc" font-size="12" font-weight="600">PACKAGE CACHES</text>
    <text x="175" y="5" fill="#6a8aa8" font-size="10">(per-project, persistent)</text>
  </g>

  <g transform="translate(100, 700)">
    <text y="0" fill="#8aa8c8" font-size="10">~/.cache/yolium/&lt;project&gt;/npm</text>
    <text x="200" y="0" fill="#00a8cc" font-size="12">→</text>
    <text x="220" y="0" fill="#ffffff" font-size="10">/home/agent/.npm</text>
  </g>

  <g transform="translate(100, 722)">
    <text y="0" fill="#8aa8c8" font-size="10">~/.cache/yolium/&lt;project&gt;/pip</text>
    <text x="200" y="0" fill="#00a8cc" font-size="12">→</text>
    <text x="220" y="0" fill="#ffffff" font-size="10">/home/agent/.cache/pip</text>
  </g>

  <g transform="translate(100, 744)">
    <text y="0" fill="#8aa8c8" font-size="10">~/.cache/yolium/&lt;project&gt;/maven</text>
    <text x="200" y="0" fill="#00a8cc" font-size="12">→</text>
    <text x="220" y="0" fill="#ffffff" font-size="10">/home/agent/.m2</text>
  </g>

  <g transform="translate(100, 766)">
    <text y="0" fill="#8aa8c8" font-size="10">~/.cache/yolium/&lt;project&gt;/gradle</text>
    <text x="200" y="0" fill="#00a8cc" font-size="12">→</text>
    <text x="220" y="0" fill="#ffffff" font-size="10">/home/agent/.gradle</text>
  </g>

  <!-- Section: Shell History -->
  <g transform="translate(100, 805)">
    <circle cx="0" cy="0" r="4" fill="#ffc107"/>
    <text x="15" y="5" fill="#ffc107" font-size="12" font-weight="600">SHELL HISTORY</text>
    <text x="145" y="5" fill="#6a8aa8" font-size="10">(per-project, persistent)</text>
  </g>

  <g transform="translate(100, 830)">
    <text y="0" fill="#8aa8c8" font-size="10">~/.yolium/projects/&lt;project&gt;/history</text>
    <text x="200" y="0" fill="#00a8cc" font-size="12">→</text>
    <text x="220" y="0" fill="#ffffff" font-size="10">/home/agent/.yolium_history</text>
  </g>

  <!-- RIGHT COLUMN -->

  <!-- Section: Agent Config -->
  <g transform="translate(610, 590)">
    <circle cx="0" cy="0" r="4" fill="#9c27b0"/>
    <text x="15" y="5" fill="#9c27b0" font-size="12" font-weight="600">AGENT CONFIG</text>
    <text x="140" y="5" fill="#6a8aa8" font-size="10">(shared across projects)</text>
  </g>

  <g transform="translate(610, 615)">
    <text y="0" fill="#8aa8c8" font-size="10">~/.claude</text>
    <text x="180" y="0" fill="#00a8cc" font-size="12">→</text>
    <text x="200" y="0" fill="#ffffff" font-size="10">/home/agent/.claude (interactive)</text>
  </g>

  <g transform="translate(610, 637)">
    <text y="0" fill="#8aa8c8" font-size="10">~/.config/opencode</text>
    <text x="180" y="0" fill="#00a8cc" font-size="12">→</text>
    <text x="200" y="0" fill="#ffffff" font-size="10">/home/agent/.config/opencode</text>
  </g>

  <g transform="translate(610, 659)">
    <text y="0" fill="#8aa8c8" font-size="10">~/.local/share/opencode</text>
    <text x="180" y="0" fill="#00a8cc" font-size="12">→</text>
    <text x="200" y="0" fill="#ffffff" font-size="10">/home/agent/.local/share/opencode</text>
  </g>

  <!-- Section: Credentials -->
  <g transform="translate(610, 700)">
    <circle cx="0" cy="0" r="4" fill="#ff9800"/>
    <text x="15" y="5" fill="#ff9800" font-size="12" font-weight="600">CREDENTIALS</text>
    <text x="130" y="5" fill="#6a8aa8" font-size="10">(read-only, staged in container)</text>
  </g>

  <g transform="translate(610, 725)">
    <text y="0" fill="#8aa8c8" font-size="10">git-credentials</text>
    <text x="180" y="0" fill="#00a8cc" font-size="12">→</text>
    <text x="200" y="0" fill="#ffffff" font-size="10">.git-credentials-mounted:ro</text>
  </g>

  <g transform="translate(610, 747)">
    <text y="0" fill="#8aa8c8" font-size="10">~/.claude (OAuth)</text>
    <text x="180" y="0" fill="#00a8cc" font-size="12">→</text>
    <text x="200" y="0" fill="#ffffff" font-size="10">.claude-mounted:ro</text>
  </g>

  <g transform="translate(610, 769)">
    <text y="0" fill="#4a6a8a" font-size="9">API keys (ANTHROPIC_API_KEY, OPENAI_API_KEY) passed as env vars</text>
  </g>

  <g transform="translate(610, 787)">
    <text y="0" fill="#4a6a8a" font-size="9">Git identity (GIT_USER_NAME, GIT_USER_EMAIL) passed as env vars</text>
  </g>

  <!-- Section: SSH Keys -->
  <g transform="translate(610, 820)">
    <circle cx="0" cy="0" r="4" fill="#28a745"/>
    <text x="15" y="5" fill="#28a745" font-size="12" font-weight="600">SSH KEYS</text>
    <text x="100" y="5" fill="#6a8aa8" font-size="10">(optional)</text>
  </g>

  <g transform="translate(610, 845)">
    <text y="0" fill="#8aa8c8" font-size="10">~/.yolium/ssh</text>
    <text x="180" y="0" fill="#00a8cc" font-size="12">→</text>
    <text x="200" y="0" fill="#ffffff" font-size="10">/home/agent/.ssh</text>
  </g>

  <!-- === WARNING SECTION === -->
  <rect x="80" y="890" width="1040" height="35" rx="6" fill="#1a0a0a" stroke="#dc3545" stroke-width="1"/>
  <circle cx="105" cy="907" r="4" fill="#dc3545"/>
  <text x="125" y="912" fill="#dc3545" font-size="12" font-weight="600">NOT ACCESSIBLE:</text>
  <text x="280" y="912" fill="#ffcdd2" font-size="11">~/, /etc, /var, other projects, system files, network (optional isolation)</text>
</svg>
