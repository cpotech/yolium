name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (v1.0.0, v0.1.0, etc.)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v0.1.5). Must match an existing git tag.'
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
          # - os: macos-latest
          #   name: macOS-ARM64
          # - os: macos-15-intel
          #   name: macOS-Intel
          - os: ubuntu-latest
            name: Linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild --only node-pty

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run make

      - name: Build Arch Linux package
        if: runner.os == 'Linux'
        run: |
          if [ ! -f build/PKGBUILD ] || [ ! -f build/yolium-desktop.desktop ]; then
            echo "Skipping Arch Linux package: build/PKGBUILD or build/yolium-desktop.desktop not found"
            exit 0
          fi

          VERSION=$(node -p "require('./package.json').version")

          mkdir -p arch-pkg

          # Create source tarball from packaged app
          tar czf "arch-pkg/yolium-desktop-${VERSION}.tar.gz" -C out "Yolium Desktop-linux-x64"

          # Copy desktop file and icon
          cp build/yolium-desktop.desktop arch-pkg/
          cp assets/icon/web-app-manifest-512x512.png arch-pkg/yolium-desktop.png

          # Generate PKGBUILD with version
          sed "s/__VERSION__/${VERSION}/" build/PKGBUILD > arch-pkg/PKGBUILD

          # Build package in Arch Linux container (--nodeps: runtime deps not needed at build time)
          docker run --rm -v "$PWD/arch-pkg:/pkg" archlinux:base-devel bash -c "
            useradd -m builder &&
            chown -R builder:builder /pkg &&
            cd /pkg &&
            su builder -c 'makepkg --nodeps --noconfirm'
          "

          # Move to make output
          mkdir -p out/make/arch/x64
          cp arch-pkg/yolium-desktop-*.pkg.tar.zst out/make/arch/x64/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: out/make/**/*
          compression-level: 0

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write # Required for creating releases

    steps:
      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List release artifacts
        run: find artifacts -type f | sort

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.exe" -o -name "*.deb" -o -name "*.rpm" -o -name "*.pkg.tar.zst" -o -name "*.zip" -o -name "*.nupkg" -o -name "*.AppImage" -o -name "*.dmg" \) | while read -r file; do
            sha256sum "$file"
          done | sort -k2 > ../checksums-sha256.txt
          cat ../checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/release-Windows/**/*
            artifacts/release-Linux/**/*
            checksums-sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
