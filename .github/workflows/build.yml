name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:  # Also allow manual trigger

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
          # - os: macos-latest
          #   name: macOS-ARM64
          # - os: macos-15-intel
          #   name: macOS-Intel
          - os: ubuntu-latest
            name: Linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild --only node-pty

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run make

      - name: Build Arch Linux package
        if: runner.os == 'Linux'
        run: |
          if [ ! -f build/PKGBUILD ] || [ ! -f build/yolium-desktop.desktop ]; then
            echo "Skipping Arch Linux package: build/PKGBUILD or build/yolium-desktop.desktop not found"
            exit 0
          fi

          VERSION=$(node -p "require('./package.json').version")

          mkdir -p arch-pkg

          # Create source tarball from packaged app
          tar czf "arch-pkg/yolium-desktop-${VERSION}.tar.gz" -C out "Yolium Desktop-linux-x64"

          # Copy desktop file and icon
          cp build/yolium-desktop.desktop arch-pkg/
          cp assets/icon/web-app-manifest-512x512.png arch-pkg/yolium-desktop.png

          # Generate PKGBUILD with version
          sed "s/__VERSION__/${VERSION}/" build/PKGBUILD > arch-pkg/PKGBUILD

          # Build package in Arch Linux container (--nodeps: runtime deps not needed at build time)
          docker run --rm -v "$PWD/arch-pkg:/pkg" archlinux:base-devel bash -c "
            useradd -m builder &&
            chown -R builder:builder /pkg &&
            cd /pkg &&
            su builder -c 'makepkg --nodeps --noconfirm'
          "

          # Move to make output
          mkdir -p out/make/arch/x64
          cp arch-pkg/yolium-desktop-*.pkg.tar.zst out/make/arch/x64/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Yolium-${{ matrix.name }}
          path: out/make/**/*
          compression-level: 0
