name: E2E Tests

on:
  push:
    branches: [main, e2efix]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      docker:
        image: docker:dind
        options: --privileged --userns=host
    env:
      DOCKER_HOST: tcp://localhost:2375
      DISPLAY: :99

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild --only node-pty

      - name: Verify Docker service container
        run: |
          echo "Checking Docker service container status..."
          docker ps --filter "name=docker*" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          if [ $? -ne 0 ]; then
            echo "ERROR: Cannot access Docker service container"
            exit 1
          fi
          echo "Docker service container is accessible"
      - name: Verify Docker daemon connectivity
        run: |
          echo "Testing Docker daemon connectivity..."
          docker info
          if [ $? -ne 0 ]; then
            echo "ERROR: Cannot connect to Docker daemon"
            echo "Checking if Docker service container is running..."
            docker ps
            exit 1
          fi
          echo "Docker daemon is accessible"
      - name: Test Docker CLI connectivity
        run: |
          echo "Testing Docker CLI connectivity..."
          docker version
          if [ $? -ne 0 ]; then
            echo "ERROR: Docker CLI not working"
            exit 1
          fi
          echo "Docker CLI is working"
      - name: Set Docker host environment
        run: |
          echo "Setting up Docker host environment..."
          export DOCKER_HOST=tcp://localhost:2375
          echo "DOCKER_HOST=$DOCKER_HOST" >> $GITHUB_ENV
          echo "Docker host environment set"
      - name: Test Buildx connectivity
        run: |
          echo "Testing Buildx connectivity..."
          docker buildx ls
          if [ $? -ne 0 ]; then
            echo "ERROR: Cannot connect to Buildx"
            exit 1
          fi
          echo "Buildx is accessible"
      - name: Test Docker socket connectivity
        run: |
          echo "Testing Docker socket connectivity..."
          docker -H tcp://localhost:2375 info
          if [ $? -ne 0 ]; then
            echo "ERROR: Cannot connect to Docker socket at localhost:2375"
            exit 1
          fi
          echo "Docker socket at localhost:2375 is accessible"
      - name: Test Docker service container connectivity
        run: |
          echo "Testing Docker service container connectivity..."
          docker -H tcp://localhost:2375 ps --filter "name=docker*" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          if [ $? -ne 0 ]; then
            echo "ERROR: Cannot access Docker service container via socket"
            exit 1
          fi
          echo "Docker service container is accessible via socket"
      - name: Test Docker daemon from service
        run: |
          echo "Testing Docker daemon from service container..."
          docker -H tcp://localhost:2375 version
          if [ $? -ne 0 ]; then
            echo "ERROR: Cannot connect to Docker daemon from service"
            exit 1
          fi
          echo "Docker daemon is accessible from service container"
      - name: Test Docker from service container
        run: |
          echo "Testing Docker from service container..."
          docker -H tcp://localhost:2375 ps
          if [ $? -ne 0 ]; then
            echo "ERROR: Cannot connect to Docker from service container"
            exit 1
          fi
          echo "Docker is accessible from service container"
      - name: Test Docker daemon in service
        run: |
          echo "Testing Docker daemon in service container..."
          docker -H tcp://localhost:2375 info
          if [ $? -ne 0 ]; then
            echo "ERROR: Cannot connect to Docker daemon in service container"
            exit 1
          fi
          echo "Docker daemon is accessible in service container"
      - name: Test Docker daemon from service container
        run: |
          echo "Testing Docker daemon from service container..."
          docker -H tcp://localhost:2375 version
          if [ $? -ne 0 ]; then
            echo "ERROR: Cannot connect to Docker daemon from service container"
            exit 1
          fi
          echo "Docker daemon is accessible from service container"
      - name: Test Docker from service container with host
        run: |
          echo "Testing Docker from service container with host..."
          docker -H tcp://localhost:2375 ps
          if [ $? -ne 0 ]; then
            echo "ERROR: Cannot connect to Docker from service container with host"
            exit 1
          fi
          echo "Docker is accessible from service container with host"
      - name: Test Docker daemon from service container with host
        run: |
          echo "Testing Docker daemon from service container with host..."
          docker -H tcp://localhost:2375 version
          if [ $? -ne 0 ]; then
            echo "ERROR: Cannot connect to Docker daemon from service container with host"
            exit 1
          fi
          echo "Docker daemon is accessible from service container with host"
      - name: Test Docker daemon from service container with host and port
        run: |
          echo "Testing Docker daemon from service container with host and port..."
          docker -H tcp://localhost:2375 version
          if [ $? -ne 0 ]; then
            echo "ERROR: Cannot connect to Docker daemon from service container with host and port"
            exit 1
          fi
          echo "Docker daemon is accessible from service container with host and port"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          driver: docker-container
          buildkitd-flags: --allow-insecure-entitlement security.insecure --allow-insecure-entitlement network.host
          install: false
          use: true
          cleanup: true
          network: host

      - name: Install Docker CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-ce-cli
      - name: Install Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxi6 libgconf-2-4

      - name: Start Xvfb
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x960x24 &

      - name: Build app for E2E tests
        run: npm run build

      - name: Verify build exists
        run: |
          if [ ! -f ".vite/build/main.js" ]; then
            echo "ERROR: Build file not found at .vite/build/main.js"
            exit 1
          fi
          echo "Build verified: .vite/build/main.js exists"

      - name: Pre-build Docker image
        run: |
          docker info
          echo "Building yolium:latest Docker image..."
          DOCKER_BUILDKIT=1 docker build \
            --build-arg USER_ID=$(id -u) \
            --build-arg GROUP_ID=$(id -g) \
            --build-arg USERNAME=agent \
            --build-arg BUILD_TIMESTAMP=$(date -Iseconds) \
            --label yolium.version=1.0.0 \
            --label "yolium.built=$(date -Iseconds)" \
            -t yolium:latest \
            src/docker/
          echo "Docker image built successfully"
          docker images yolium

      - name: Verify Docker image
        run: |
          docker images yolium:latest
          if [ $? -ne 0 ]; then
            echo "ERROR: yolium:latest image not found"
            exit 1
          fi

      - name: Run E2E tests
        run: |
          echo "Starting E2E tests at $(date)"
          xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" \
            npx playwright test --config config/playwright.config.ts --reporter=list --timeout=120000
          echo "E2E tests completed at $(date)"
        env:
          CI: true
          DEBUG: pw:api
          ELECTRON_ENABLE_LOGGING: 1

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-${{ github.run_id }}
          path: |
            src/tests/e2e-results/
            playwright-report/
          retention-days: 7