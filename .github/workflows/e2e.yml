name: E2E Tests

on:
  workflow_dispatch: # Manual trigger only

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild --only node-pty

      - name: Build app for E2E tests
        run: npm run build

      - name: Verify build exists
        run: |
          if [ ! -f ".vite/build/main.js" ]; then
            echo "ERROR: Build file not found at .vite/build/main.js"
            exit 1
          fi
          echo "Build verified: .vite/build/main.js exists"

      - name: Start Docker
        run: |
          # Docker is pre-installed on GitHub runners
          docker info
          echo "Checking for existing yolium image..."
          docker images | grep yolium || echo "No yolium image found - will be built during tests"

      - name: Run E2E tests
        run: |
          echo "Starting E2E tests at $(date)"
          xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" \
            npx playwright test --reporter=list --timeout=120000
          echo "E2E tests completed at $(date)"
        env:
          CI: true
          DEBUG: pw:api
          ELECTRON_ENABLE_LOGGING: 1

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-results
          path: |
            src/tests/e2e-results/
            playwright-report/
          retention-days: 7

  # Separate job for macOS E2E tests (optional, more expensive)
  e2e-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' # Manual trigger only

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild --only node-pty

      - name: Build app for E2E tests
        run: npm run build

      - name: Verify build exists
        run: |
          if [ ! -f ".vite/build/main.js" ]; then
            echo "ERROR: Build file not found at .vite/build/main.js"
            exit 1
          fi
          echo "Build verified: .vite/build/main.js exists"

      - name: Install Docker
        run: |
          brew install --cask docker
          # Start Docker Desktop
          open -a Docker
          # Wait for Docker to start
          while ! docker info > /dev/null 2>&1; do
            echo "Waiting for Docker to start..."
            sleep 5
          done
          echo "Docker is running"

      - name: Check Docker images
        run: |
          echo "Checking for existing yolium image..."
          docker images | grep yolium || echo "No yolium image found - will be built during tests"

      - name: Run E2E tests
        run: |
          echo "Starting E2E tests at $(date)"
          npx playwright test --reporter=list --timeout=120000
          echo "E2E tests completed at $(date)"
        env:
          CI: true
          DEBUG: pw:api
          ELECTRON_ENABLE_LOGGING: 1

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-results-macos
          path: |
            src/tests/e2e-results/
            playwright-report/
          retention-days: 7
