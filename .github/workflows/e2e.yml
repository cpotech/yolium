name: E2E Tests

on:
  workflow_dispatch: # Manual trigger only

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild --only node-pty

      - name: Build app for E2E tests
        run: npm run build

      - name: Verify build exists
        run: |
          if [ ! -f ".vite/build/main.js" ]; then
            echo "ERROR: Build file not found at .vite/build/main.js"
            exit 1
          fi
          echo "Build verified: .vite/build/main.js exists"

      - name: Start Docker
        run: |
          # Docker is pre-installed on GitHub runners
          docker info

      - name: Run E2E tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npm run test:e2e
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-results
          path: |
            src/tests/e2e-results/
            playwright-report/
          retention-days: 7
