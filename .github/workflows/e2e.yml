name: E2E Tests

on:
  workflow_dispatch: # Manual trigger only

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild --only node-pty

      - name: Build app
        run: npm run package

      - name: Start Docker
        run: |
          # Docker is pre-installed on GitHub runners
          docker info

      - name: Run E2E tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npm run test:e2e
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-results
          path: |
            src/tests/e2e-results/
            playwright-report/
          retention-days: 7

  # Separate job for macOS E2E tests (optional, more expensive)
  e2e-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' # Manual trigger only

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild --only node-pty

      - name: Build app
        run: npm run package

      - name: Install Docker
        run: |
          brew install --cask docker
          # Start Docker Desktop
          open -a Docker
          # Wait for Docker to start
          while ! docker info > /dev/null 2>&1; do
            echo "Waiting for Docker to start..."
            sleep 5
          done
          echo "Docker is running"

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-results-macos
          path: |
            src/tests/e2e-results/
            playwright-report/
          retention-days: 7
